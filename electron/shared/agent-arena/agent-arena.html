    };

    // ── Agent Type to Sprite Key Mapping ─────────────────────
    const AGENT_TYPE_MAP = {
      'Explore': 'explorer',
      'code-reviewer': 'reviewer',
      'superpowers:code-reviewer': 'reviewer',
      'test-writer': 'tester',
      'frontend-design': 'frontend',
      'debugging-assistant': 'debugger',
      'systematic-debugging': 'debugger',
      'bug-hunter-fixer': 'debugger',
    };
    const GENERIC_SPRITES = ['generic1','generic2','generic3','generic4','generic5','generic6'];

    // ── Character Constants ──────────────────────────────────
    const CHAR_FRAME_SIZE = 32;
    const CHAR_SCALE = 9;          // render at 288x288
    const CHAR_DRAW_SIZE = CHAR_FRAME_SIZE * CHAR_SCALE;
    const CHAR_Y_OFFSET = 6 * CHAR_SCALE;  // shift sprites down to plant feet on ground
    const WALK_SPEED = 9;          // pixels per frame during walk-in/walk-off
    const CHAR_ANIM_SPEED = 250;   // ms per animation frame

    // ── Character States ─────────────────────────────────────
    const CharState = {
      NONE: 'NONE',
      WALK_IN: 'WALK_IN',
      ACTIVE: 'ACTIVE',
      IDLE: 'IDLE',
      FROZEN: 'FROZEN',
      WALK_OFF: 'WALK_OFF',
    };

    // ── Character Class ──────────────────────────────────────
    class Character {
      constructor(id, spriteKey, targetX, isBoss) {
        this.id = id;
        this.spriteKey = spriteKey;
        this.targetX = targetX;
        this.isBoss = isBoss;
        this.state = CharState.WALK_IN;
        this.elapsed = 0;
        this.typeName = isBoss ? 'Orchestrator' : '';
        this.frameIndex = 0;
        this.lastFrameSwitch = 0;

        // Walk in from left (boss) or right (agents)
        if (isBoss) {
          this.x = -CHAR_DRAW_SIZE;
        } else {
          this.x = width + CHAR_DRAW_SIZE;
        }
      }

      update(dt) {
        const now = performance.now();
        if (now - this.lastFrameSwitch >= CHAR_ANIM_SPEED) {
          this.frameIndex = (this.frameIndex + 1) % 3;
          this.lastFrameSwitch = now;
        }

        if (this.state === CharState.WALK_IN) {
          if (this.isBoss) {
            this.x += WALK_SPEED;
            if (this.x >= this.targetX) {
              this.x = this.targetX;
              this.state = CharState.ACTIVE;
            }
          } else {
            this.x -= WALK_SPEED;
            if (this.x <= this.targetX) {
              this.x = this.targetX;
              this.state = CharState.ACTIVE;
            }
          }
        } else if (this.state === CharState.WALK_OFF) {
          this.x += WALK_SPEED;
          if (this.x > width + CHAR_DRAW_SIZE) {
            this.state = CharState.NONE;
          }
        }
      }

      draw(ctx, groundY) {
        const sprite = sprites[this.spriteKey];
        if (!sprite) return;

        // Determine sprite row
        let row;
        if (this.state === CharState.WALK_IN) {
          // Boss walks in from left (facing right), agents walk in from right (facing left)
          row = this.isBoss ? 2 : 1; // row 2 = right, row 1 = left
        } else if (this.state === CharState.WALK_OFF) {
          row = 2; // facing right, walking off
        } else {
          row = 0; // facing front for active/idle/frozen
        }

        // For non-walking states, use frame 1 (middle/idle frame)
        let frame = this.frameIndex;
        if (this.state !== CharState.WALK_IN && this.state !== CharState.WALK_OFF) {
          frame = 1;
        }

        const sx = frame * CHAR_FRAME_SIZE;
        const sy = row * CHAR_FRAME_SIZE;
        const drawX = Math.floor(this.x - CHAR_DRAW_SIZE / 2);
        const drawY = Math.floor(groundY - CHAR_DRAW_SIZE + CHAR_Y_OFFSET);

        ctx.imageSmoothingEnabled = false;
        ctx.drawImage(
          sprite.img,
          sx, sy, CHAR_FRAME_SIZE, CHAR_FRAME_SIZE,
          drawX, drawY, CHAR_DRAW_SIZE, CHAR_DRAW_SIZE
        );

        // Draw "Zzz" for frozen state
        if (this.state === CharState.FROZEN) {
          ctx.font = 'bold 54px monospace';
          ctx.fillStyle = '#ff8c28';
          ctx.textAlign = 'center';
          ctx.fillText('Zzz', Math.floor(this.x), drawY - 24);
        }

        // Draw label below character
        if (this.typeName) {
          ctx.font = 'bold 39px monospace';
          ctx.fillStyle = '#cccccc';
          ctx.textAlign = 'center';
          ctx.fillText(this.typeName, Math.floor(this.x), groundY + 44);
        }

        // Draw elapsed time
        if (this.elapsed > 0) {
          ctx.font = '36px monospace';
          ctx.fillStyle = '#888888';
          ctx.textAlign = 'center';
          ctx.fillText(formatElapsed(this.elapsed), Math.floor(this.x), groundY + 86);
        }
      }
    }

    // ── Arena State ──────────────────────────────────────────
    let boss = null;
    let agents = new Map();
    let genericIndex = 0;

    // ── Slot Positioning ─────────────────────────────────────
    function getSlotX(index) {
      const centerX = Math.floor(width / 2);
      const spacing = CHAR_DRAW_SIZE + 16;

      if (index === -1) {
        // Boss: right of campfire
        return centerX + spacing;
      }

      // Agents alternate left and right
      const side = (index % 2 === 0) ? -1 : 1;
      const distance = Math.floor(index / 2) + 1;
      const baseOffset = spacing;

      if (side === -1) {
        return centerX - baseOffset * distance;
      } else {
        return centerX + baseOffset * (distance + 1);
      }
    }

    // ── Format Elapsed Time ──────────────────────────────────
    function formatElapsed(seconds) {
      if (seconds < 60) return seconds + 's';
      if (seconds < 3600) return Math.floor(seconds / 60) + 'm ' + (seconds % 60) + 's';
      return Math.floor(seconds / 3600) + 'h ' + Math.floor((seconds % 3600) / 60) + 'm';
    }

    // ── Resolve Sprite Key ───────────────────────────────────
    function resolveSpriteKey(agentType) {
      if (AGENT_TYPE_MAP[agentType]) {
        return AGENT_TYPE_MAP[agentType];
      }
      const key = GENERIC_SPRITES[genericIndex % GENERIC_SPRITES.length];
      genericIndex++;
      return key;
    }

    // ── Pretty Name from Agent Type ──────────────────────────
    function prettyName(agentType) {
      if (!agentType) return '';
      // "code-reviewer" -> "Code Reviewer", "Explore" -> "Explore"
      return agentType
        .replace(/^superpowers:/, '')
        .split(/[-_]/)
        .map(w => w.charAt(0).toUpperCase() + w.slice(1))
        .join(' ');
    }

    // ── Public API: updateAgentState ─────────────────────────
    function updateAgentState(state) {
      // Handle orchestrator (boss)
      if (state.orchestrator) {
        if (!boss) {
          boss = new Character('boss', 'boss', getSlotX(-1), true);
        }
        boss.elapsed = state.orchestrator.elapsed || 0;
        if (boss.state === CharState.ACTIVE || boss.state === CharState.IDLE) {
          if (boss.elapsed > 180) {
            boss.state = CharState.FROZEN;
          }
        }
      } else {
        if (boss && boss.state !== CharState.WALK_OFF && boss.state !== CharState.NONE) {
          boss.state = CharState.WALK_OFF;
        }
      }

      // Track which agent IDs are in the new state
      const activeIds = new Set();
      if (state.agents) {
        state.agents.forEach((agentData, index) => {
          activeIds.add(agentData.id);

          if (!agents.has(agentData.id)) {
            // New agent: create and walk in
            const spriteKey = resolveSpriteKey(agentData.type);
            const targetX = getSlotX(index);
            const char = new Character(agentData.id, spriteKey, targetX, false);
            char.typeName = prettyName(agentData.type);
            agents.set(agentData.id, char);
          }

          const char = agents.get(agentData.id);
          char.elapsed = agentData.elapsed || 0;

          // Update state based on agent data
          if (char.state === CharState.ACTIVE || char.state === CharState.IDLE) {
            if (agentData.state === 'frozen' || char.elapsed > 180) {
              char.state = CharState.FROZEN;
            } else if (agentData.state === 'idle') {
              char.state = CharState.IDLE;
            } else {
              char.state = CharState.ACTIVE;
            }
          }
        });
      }

      // Walk off agents not in the new state
      for (const [id, char] of agents) {
        if (!activeIds.has(id) && char.state !== CharState.WALK_OFF && char.state !== CharState.NONE) {
          char.state = CharState.WALK_OFF;
        }
      }

      // Clean up NONE-state characters
      for (const [id, char] of agents) {
        if (char.state === CharState.NONE) {
          agents.delete(id);
        }
      }
      if (boss && boss.state === CharState.NONE) {
        boss = null;
      }
    }

    // ── State ─────────────────────────────────────────────────
    const canvas = document.getElementById('arena');
    const ctx = canvas.getContext('2d');

    let bgCanvas = null;
    let bgCtx = null;
    let stars = [];
    let width = 0;
    let height = 0;
    let dpr = 1;
    let lastFrameTime = 0;

    // ── Stars ─────────────────────────────────────────────────
    function generateStars() {
      const skyHeight = height - GROUND_HEIGHT;
      stars = [];
      for (let i = 0; i < STAR_COUNT; i++) {
        stars.push({
          x: Math.floor(Math.random() * width),
          y: Math.floor(Math.random() * skyHeight),
          size: Math.random() < 0.6 ? 1 : 2,
          speed: 0.5 + Math.random() * 2.0,
          offset: Math.random() * Math.PI * 2,
          baseAlpha: 0.4 + Math.random() * 0.6
        });
      }
    }

    // ── Background (offscreen) ────────────────────────────────
    function renderBackground() {
      bgCanvas = document.createElement('canvas');
      bgCanvas.width = width;
      bgCanvas.height = height;
      bgCtx = bgCanvas.getContext('2d');

      // Sky gradient
      const skyHeight = height - GROUND_HEIGHT;
      const grad = bgCtx.createLinearGradient(0, 0, 0, skyHeight);
      grad.addColorStop(0, SKY_TOP);
      grad.addColorStop(1, SKY_BOTTOM);
      bgCtx.fillStyle = grad;
      bgCtx.fillRect(0, 0, width, skyHeight);

      // Ground
      bgCtx.fillStyle = GROUND_COLOR;
      bgCtx.fillRect(0, skyHeight, width, GROUND_HEIGHT);

      // Ground line
      bgCtx.fillStyle = GROUND_LINE_COLOR;
      bgCtx.fillRect(0, skyHeight, width, 1);
    }

    // ── Resize ────────────────────────────────────────────────
    function handleResize() {
      dpr = window.devicePixelRatio || 1;
      width = Math.floor(window.innerWidth * dpr);
      height = Math.floor(window.innerHeight * dpr);

      canvas.width = width;
      canvas.height = height;

      renderBackground();
      generateStars();
    }

    // ── Campfire Drawing ─────────────────────────────────────
    function drawCampfire(timestamp) {
      const sprite = sprites['campfire'];
      if (!sprite) return;

      // Advance frame
      if (timestamp - campfireLastSwitch >= CAMPFIRE_ANIM_SPEED) {
        campfireFrameIndex = (campfireFrameIndex + 1) % CAMPFIRE_FRAMES.length;
        campfireLastSwitch = timestamp;
      }

      const frame = CAMPFIRE_FRAMES[campfireFrameIndex];
      const sx = frame.col * CAMPFIRE_FRAME_W;
      const sy = frame.row * CAMPFIRE_FRAME_H;
      const drawW = CAMPFIRE_FRAME_W * CAMPFIRE_SCALE;
      const drawH = CAMPFIRE_FRAME_H * CAMPFIRE_SCALE;

      const groundY = height - GROUND_HEIGHT;
      const campfireYOffset = 8 * CAMPFIRE_SCALE;  // shift down to sit on ground
      const drawX = Math.floor(width / 2 - drawW / 2);
      const drawY = Math.floor(groundY - drawH + campfireYOffset);

      // Warm glow behind the fire
      ctx.save();
      const glowRadius = 40;
      const glow = ctx.createRadialGradient(
        drawX + drawW / 2, drawY + drawH / 2, 4,
        drawX + drawW / 2, drawY + drawH / 2, glowRadius
      );
      glow.addColorStop(0, 'rgba(255, 140, 40, 0.35)');
      glow.addColorStop(1, 'rgba(255, 140, 40, 0)');
      ctx.fillStyle = glow;
      ctx.fillRect(
        drawX + drawW / 2 - glowRadius,
        drawY + drawH / 2 - glowRadius,
        glowRadius * 2,
        glowRadius * 2
      );
      ctx.restore();

      // Draw the sprite frame
      ctx.imageSmoothingEnabled = false;
      ctx.drawImage(
        sprite.img,
        sx, sy, CAMPFIRE_FRAME_W, CAMPFIRE_FRAME_H,
        drawX, drawY, drawW, drawH
      );
    }

    // ── Render ────────────────────────────────────────────────
    function render(timestamp) {
      requestAnimationFrame(render);

      if (timestamp - lastFrameTime < FRAME_INTERVAL) return;
      lastFrameTime = timestamp;

      // Draw cached background
      ctx.drawImage(bgCanvas, 0, 0);

      // Draw twinkling stars
      const time = timestamp / 1000;
      for (let i = 0; i < stars.length; i++) {
        const s = stars[i];
        const alpha = s.baseAlpha * (0.5 + 0.5 * Math.sin(time * s.speed + s.offset));
        ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
        ctx.fillRect(s.x, s.y, s.size, s.size);
      }

      // Draw campfire
      drawCampfire(timestamp);

      const groundY = height - GROUND_HEIGHT;

      // Draw characters
      if (boss) {
        boss.update(FRAME_INTERVAL);
        boss.draw(ctx, groundY);
      }
      for (const [id, char] of agents) {
        char.update(FRAME_INTERVAL);
        char.draw(ctx, groundY);
      }

      // Empty state message
      if (!boss) {
        ctx.font = '54px monospace';
        ctx.fillStyle = '#555555';
        ctx.textAlign = 'center';
        ctx.fillText('Waiting for Claude...', Math.floor(width / 2), groundY - 200);
      }
    }

    // ── Init ──────────────────────────────────────────────────
    async function init() {
      // Load all sprites in parallel
      const spriteLoads = [
        loadSprite('campfire', CAMPFIRE_B64, CAMPFIRE_FRAME_W, CAMPFIRE_FRAME_H),
      ];

      // Load all character sprites
      for (const [key, b64] of Object.entries(CHARACTER_DATA)) {
        spriteLoads.push(loadSprite(key, b64, CHAR_FRAME_SIZE, CHAR_FRAME_SIZE));
      }

      await Promise.all(spriteLoads);

      window.addEventListener('resize', handleResize);
      handleResize();
      requestAnimationFrame(render);
    }

    init();
  </script>
